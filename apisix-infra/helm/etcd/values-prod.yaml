replicaCount: 3

auth:
  rbac:
    enabled: true
    rootPassword: ""  # Set via --set at deploy time or sealed secret

persistence:
  enabled: true
  size: 10Gi
  storageClass: ssd

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoCompactionMode: periodic
autoCompactionRetention: "1h"

extraEnvVars:
  - name: ETCD_QUOTA_BACKEND_BYTES
    value: "8589934592"

podAntiAffinity:
  preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: etcd
        topologyKey: kubernetes.io/hostname

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

metrics:
  enabled: true
  podMonitor:
    enabled: true
    namespace: monitoring
