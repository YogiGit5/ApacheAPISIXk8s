_meta:
  resource: routes
  id: "102"

name: tracking-write-routes
desc: "Live Tracking Service - WRITE endpoints (20 req/min per IP)"
uri: /api/v1/tracking/*
methods:
  - POST
  - PUT
  - PATCH
  - DELETE
upstream_id: "1"
plugins:
  # auth disabled – will be replaced by Keycloak OIDC validation
  limit-count:
    count: 20
    time_window: 60
    key_type: var
    key: remote_addr
    rejected_code: 429
    rejected_msg: '{"error": "Rate limit exceeded", "retry_after": 60}'
    policy: local
    group: tracking-write
  proxy-rewrite:
    regex_uri:
      - "^/api/v1/tracking/(.*)"
      - "/api/v1/tracking/$1"
status: 1
