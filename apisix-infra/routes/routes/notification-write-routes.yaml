_meta:
  resource: routes
  id: "401"

name: notification-write-routes
desc: "Notification Service - WRITE endpoints (20 req/min per IP)"
uri: /api/v1/notifications/*
methods:
  - POST
  - PUT
  - PATCH
  - DELETE
upstream_id: "4"
plugins:
  # auth disabled – will be replaced by Keycloak OIDC validation
  limit-count:
    count: 20
    time_window: 60
    key_type: var
    key: remote_addr
    rejected_code: 429
    rejected_msg: '{"error": "Rate limit exceeded", "retry_after": 60}'
    policy: local
    group: notification-write
  proxy-rewrite:
    regex_uri:
      - "^/api/v1/notifications/(.*)"
      - "/api/v1/notifications/$1"
status: 1
