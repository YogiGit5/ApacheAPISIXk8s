_meta:
  resource: routes
  id: "101"

name: tracking-websocket-route
desc: "Live Tracking Service - WebSocket (consistent hash upstream)"
uri: /ws/tracking
enable_websocket: true
upstream_id: "5"
plugins:
  # auth disabled – will be replaced by Keycloak OIDC validation
  limit-conn:
    conn: 50
    burst: 10
    default_conn_delay: 1
    key_type: var
    key: remote_addr
    rejected_code: 429
    rejected_msg: '{"error": "Too many concurrent connections"}'
  proxy-rewrite:
    uri: "/ws/tracking"
status: 1
