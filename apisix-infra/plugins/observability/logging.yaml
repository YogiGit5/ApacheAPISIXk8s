_meta:
  resource: global_rules
  id: "5"

plugins:
  http-logger:
    uri: "${HTTP_LOGGER_URI:-http://logging-collector.vzone.svc.cluster.local:9080/logs}"
    batch_max_size: 100
    inactive_timeout: 5
    buffer_duration: 30
    max_retry_count: 3
    retry_delay: 1
    concat_method: json
    include_req_body: false
    include_resp_body: false
