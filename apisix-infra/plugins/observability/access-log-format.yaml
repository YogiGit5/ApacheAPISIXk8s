# ──────────────────────────────────────────────────────────
#  APISIX Access Log Configuration Reference
#  Configure in Helm values under apisix.nginx.configurationSnippet
#  or via the http-logger plugin for structured logging
# ──────────────────────────────────────────────────────────
#
#  Default APISIX access log: /usr/local/apisix/logs/access.log
#  Default error log:         /usr/local/apisix/logs/error.log
#
#  Structured JSON access log format (set in config.yaml):
#
#  nginx_config:
#    http:
#      access_log_format: |
#        {"timestamp":"$time_iso8601",
#         "remote_addr":"$remote_addr",
#         "request_method":"$request_method",
#         "request_uri":"$request_uri",
#         "status":$status,
#         "body_bytes_sent":$body_bytes_sent,
#         "request_time":$request_time,
#         "upstream_response_time":"$upstream_response_time",
#         "upstream_addr":"$upstream_addr",
#         "http_user_agent":"$http_user_agent",
#         "http_x_request_id":"$http_x_request_id",
#         "route_id":"$route_id",
#         "service_id":"$service_id",
#         "consumer_name":"$consumer_name"}
#      access_log_format_escape: json
#
#  http-logger plugin fields (sent to external collector):
#    - request.method, request.uri, request.headers
#    - response.status, response.headers
#    - upstream.addr, upstream.status
#    - latency (APISIX processing time in ms)
#    - route.id, route.name
#    - consumer.username
#    - client_ip
#    - start_time
