# ──────────────────────────────────────────────────────────
#  cert-manager resources for automated TLS via Let's Encrypt
#  Prerequisites: cert-manager installed in the cluster
#    helm install cert-manager jetstack/cert-manager \
#      --namespace cert-manager --create-namespace \
#      --set crds.enabled=true
# ──────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: apisix
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: apisix
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: apisix-gateway-tls
  namespace: apisix
spec:
  secretName: apisix-gateway-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "${GATEWAY_DOMAIN}"
  dnsNames:
    - "${GATEWAY_DOMAIN}"
    - "*.${GATEWAY_DOMAIN}"
  duration: 2160h    # 90 days
  renewBefore: 360h  # Renew 15 days before expiry
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
