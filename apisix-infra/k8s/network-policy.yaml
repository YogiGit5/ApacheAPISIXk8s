apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apisix-network-policy
  namespace: apisix
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: apisix
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP/HTTPS gateway traffic from anywhere
    - ports:
        - port: 9080
          protocol: TCP
        - port: 9443
          protocol: TCP
    # Allow Admin API only from within the cluster
    - from:
        - namespaceSelector: {}
      ports:
        - port: 9180
          protocol: TCP
    # Allow Prometheus scraping
    - ports:
        - port: 9091
          protocol: TCP
  egress:
    # Allow APISIX to reach etcd
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: etcd
      ports:
        - port: 2379
          protocol: TCP
    # Allow APISIX to reach backend services in vzone namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vzone
      ports:
        - port: 8080
          protocol: TCP
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
