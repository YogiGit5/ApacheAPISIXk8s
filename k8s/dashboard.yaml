# APISIX Dashboard — Web UI for managing routes, upstreams, plugins
apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-dashboard-config
  namespace: apisix
data:
  conf.yaml: |
    conf:
      listen:
        host: 0.0.0.0
        port: 9000
      etcd:
        endpoints:
          - "http://apisix-etcd.apisix.svc.cluster.local:2379"
        prefix: "/apisix"
      log:
        error_log:
          level: warn
          file_path: /dev/stderr
        access_log:
          file_path: /dev/stdout
    authentication:
      secret: dashboard-secret-key-change-in-prod
      expire_time: 86400
      users:
        - username: admin
          password: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-dashboard
  namespace: apisix
  labels:
    app: apisix-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apisix-dashboard
  template:
    metadata:
      labels:
        app: apisix-dashboard
    spec:
      containers:
        - name: dashboard
          image: apache/apisix-dashboard:3.0.1-alpine
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: config
              mountPath: /usr/local/apisix-dashboard/conf/conf.yaml
              subPath: conf.yaml
          readinessProbe:
            httpGet:
              path: /ping
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: apisix-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-dashboard
  namespace: apisix
spec:
  type: NodePort
  selector:
    app: apisix-dashboard
  ports:
    - port: 9000
      targetPort: 9000
