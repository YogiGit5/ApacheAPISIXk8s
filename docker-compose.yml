services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: apisix-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    image: apache/apisix:3.9.1-debian
    container_name: apisix-gateway
    depends_on:
      etcd:
        condition: service_healthy
    ports:
      - "9080:9080"   # Gateway HTTP
      - "9443:9443"   # Gateway HTTPS
      - "9180:9180"   # Admin API
      - "9091:9091"   # Prometheus metrics
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9080'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: kennethreitz/httpbin:latest
    container_name: apisix-backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/get"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  etcd-data:
    driver: local
